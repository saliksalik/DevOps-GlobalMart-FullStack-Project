version: '3.8'

# ──────────────────────────────────────────────────────────────────────────────
# File: docker-compose.yml (ROOT — Full Local Dev Stack)
# Purpose: Run GlobalMart API + All supporting services locally for development.
# Run:   docker-compose up -d
# Stop:  docker-compose down
#
# Service Map:
#   globalmart-api  → http://localhost:3000
#   globalmart-v2   → http://localhost:3001  (green slot for blue-green demo)
#   prometheus      → http://localhost:9090
#   grafana         → http://localhost:3002  (admin/admin)
#   kibana          → http://localhost:5601
# ──────────────────────────────────────────────────────────────────────────────

networks:
  globalmart-net:
    driver: bridge

volumes:
  prometheus-data:
  grafana-data:
  elasticsearch-data:

services:

  # ── GlobalMart API (Blue / v1) ────────────────────────────────────────────
  globalmart-api:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: production
    container_name: globalmart-blue
    restart: unless-stopped
    ports:
      - "3000:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_VERSION=v1
      - DEPLOY_COLOR=blue
    networks:
      - globalmart-net
    healthcheck:
      test: ["CMD-SHELL", "wget -qO- http://localhost:3000/health || exit 1"]
      interval: 30s
      timeout: 5s
      retries: 3
      start_period: 10s

  # ── GlobalMart API (Green / v2) — idle until blue-green switch ───────────
  globalmart-api-v2:
    build:
      context: ./app
      dockerfile: Dockerfile
      target: production
    container_name: globalmart-green
    restart: unless-stopped
    ports:
      - "3001:3000"
    environment:
      - NODE_ENV=production
      - PORT=3000
      - APP_VERSION=v2
      - DEPLOY_COLOR=green
    networks:
      - globalmart-net

  # ── Prometheus ────────────────────────────────────────────────────────────
  prometheus:
    image: prom/prometheus:v2.49.0
    container_name: prometheus
    restart: unless-stopped
    ports:
      - "9090:9090"
    volumes:
      - ./monitoring/prometheus.yml:/etc/prometheus/prometheus.yml:ro
      - ./monitoring/rules:/etc/prometheus/rules:ro
      - prometheus-data:/prometheus
    command:
      - '--config.file=/etc/prometheus/prometheus.yml'
      - '--storage.tsdb.path=/prometheus'
      - '--storage.tsdb.retention.time=7d'
      - '--web.enable-lifecycle'
    networks:
      - globalmart-net

  # ── Grafana ───────────────────────────────────────────────────────────────
  grafana:
    image: grafana/grafana:10.3.0
    container_name: grafana
    restart: unless-stopped
    ports:
      - "3002:3000"
    environment:
      - GF_SECURITY_ADMIN_USER=admin
      - GF_SECURITY_ADMIN_PASSWORD=admin
      - GF_USERS_ALLOW_SIGN_UP=false
    volumes:
      - grafana-data:/var/lib/grafana
    depends_on:
      - prometheus
    networks:
      - globalmart-net

  # ── Elasticsearch ─────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - discovery.type=single-node
      - xpack.security.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
    networks:
      - globalmart-net

  # ── Logstash ──────────────────────────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    restart: unless-stopped
    volumes:
      - ./elk/logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./elk/logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "5044:5044"
      - "5000:5000"
    depends_on:
      - elasticsearch
    networks:
      - globalmart-net

  # ── Kibana ────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
    ports:
      - "5601:5601"
    depends_on:
      - elasticsearch
    networks:
      - globalmart-net

  # ── Node Exporter ─────────────────────────────────────────────────────────
  node-exporter:
    image: prom/node-exporter:v1.7.0
    container_name: node-exporter
    restart: unless-stopped
    ports:
      - "9100:9100"
    volumes:
      - /proc:/host/proc:ro
      - /sys:/host/sys:ro
      - /:/rootfs:ro
    command:
      - '--path.procfs=/host/proc'
      - '--path.sysfs=/host/sys'
    networks:
      - globalmart-net
