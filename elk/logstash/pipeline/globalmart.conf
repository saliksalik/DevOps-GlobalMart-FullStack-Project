# File: elk/logstash/pipeline/globalmart.conf
# ──────────────────────────────────────────────────────────────────────────────
# Logstash Pipeline: Ingest → Parse → Enrich → Ship to Elasticsearch
# ──────────────────────────────────────────────────────────────────────────────

input {

  # ── Receive logs from Filebeat (Docker container logs) ──────────────────
  beats {
    port => 5044
    type => "docker-logs"
  }

  # ── Receive logs via TCP (direct from app or syslog) ────────────────────
  tcp {
    port => 5000
    codec => json_lines
    type  => "app-logs"
  }

  # ── Receive logs via UDP (lightweight, fire-and-forget) ─────────────────
  udp {
    port  => 5000
    codec => json_lines
    type  => "app-logs"
  }
}

filter {

  # ── Parse Morgan HTTP access logs from GlobalMart ───────────────────────
  # Morgan 'combined' format: 127.0.0.1 - - [10/Jan/2024:12:00:00 +0000] "GET /api/products HTTP/1.1" 200 512 "-" "Mozilla/5.0"
  if [type] == "docker-logs" {
    grok {
      match => {
        "message" => '%{IPORHOST:client_ip} - %{DATA:user} \[%{HTTPDATE:timestamp}\] "%{WORD:http_method} %{URIPATHPARAM:request} HTTP/%{NUMBER:http_version}" %{NUMBER:status_code:int} %{NUMBER:bytes:int} "%{DATA:referrer}" "%{DATA:user_agent}"'
      }
      tag_on_failure => ["_grokparsefailure_access_log"]
    }

    # Parse the timestamp from the log
    date {
      match    => ["timestamp", "dd/MMM/yyyy:HH:mm:ss Z"]
      target   => "@timestamp"
      timezone => "UTC"
    }

    # Convert status code to integer for range queries
    mutate {
      convert => {
        "status_code" => "integer"
        "bytes"       => "integer"
      }
    }
  }

  # ── Parse structured JSON logs from GlobalMart app ───────────────────────
  if [type] == "app-logs" {
    json {
      source => "message"
    }

    date {
      match  => ["timestamp", "ISO8601"]
      target => "@timestamp"
    }
  }

  # ── Enrich: classify HTTP status codes ───────────────────────────────────
  if [status_code] {
    if [status_code] >= 500 {
      mutate { add_field => { "log_level" => "ERROR" } }
    } else if [status_code] >= 400 {
      mutate { add_field => { "log_level" => "WARN" } }
    } else if [status_code] >= 200 {
      mutate { add_field => { "log_level" => "INFO" } }
    }
  }

  # ── Enrich: add environment tag ───────────────────────────────────────────
  mutate {
    add_field => {
      "application" => "globalmart-api"
      "environment" => "${NODE_ENV:production}"
    }
    # Remove noisy fields
    remove_field => ["agent", "ecs", "input", "log"]
  }

  # ── GeoIP enrichment (maps client IPs to locations) ──────────────────────
  if [client_ip] and [client_ip] != "127.0.0.1" {
    geoip {
      source => "client_ip"
      target => "geoip"
    }
  }
}

output {

  # ── Ship to Elasticsearch ─────────────────────────────────────────────────
  elasticsearch {
    hosts    => ["elasticsearch:9200"]
    index    => "globalmart-logs-%{+YYYY.MM.dd}"
    # index_template: auto-created by Logstash
  }

  # ── Debug: also print to stdout (disable in production) ──────────────────
  # stdout {
  #   codec => rubydebug
  # }
}
