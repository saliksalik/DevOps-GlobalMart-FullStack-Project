version: '3.8'

# ──────────────────────────────────────────────────────────────────────────────
# File: elk/docker-compose.yml
# Stack: Elasticsearch + Logstash + Kibana + Filebeat (sidecar)
# Run:   docker-compose -f elk/docker-compose.yml up -d
# URLs:
#   Kibana         → http://localhost:5601
#   Elasticsearch  → http://localhost:9200
#
# ⚠ Windows WSL2 / Docker Desktop: Run this first if ES fails to start:
#   wsl -d docker-desktop
#   sysctl -w vm.max_map_count=262144
# ──────────────────────────────────────────────────────────────────────────────

networks:
  elk-net:
    driver: bridge

volumes:
  elasticsearch-data:
  kibana-data:

services:

  # ── Elasticsearch ─────────────────────────────────────────────────────────
  elasticsearch:
    image: docker.elastic.co/elasticsearch/elasticsearch:8.12.0
    container_name: elasticsearch
    restart: unless-stopped
    environment:
      - node.name=elasticsearch
      - cluster.name=globalmart-elk
      - discovery.type=single-node          # Single node for dev/demo
      - bootstrap.memory_lock=true
      - xpack.security.enabled=false        # Disable auth for local dev
      - xpack.security.http.ssl.enabled=false
      - "ES_JAVA_OPTS=-Xms512m -Xmx512m"   # Tune for your machine RAM
    ulimits:
      memlock:
        soft: -1
        hard: -1
    volumes:
      - elasticsearch-data:/usr/share/elasticsearch/data
    ports:
      - "9200:9200"
      - "9300:9300"
    networks:
      - elk-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:9200/_cluster/health || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 60s

  # ── Logstash ──────────────────────────────────────────────────────────────
  logstash:
    image: docker.elastic.co/logstash/logstash:8.12.0
    container_name: logstash
    restart: unless-stopped
    environment:
      - "LS_JAVA_OPTS=-Xms256m -Xmx256m"
    volumes:
      - ./logstash/pipeline:/usr/share/logstash/pipeline:ro
      - ./logstash/config/logstash.yml:/usr/share/logstash/config/logstash.yml:ro
    ports:
      - "5044:5044"     # Beats input
      - "5000:5000/tcp" # TCP input
      - "5000:5000/udp" # UDP input
      - "9600:9600"     # Logstash API
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk-net

  # ── Kibana ────────────────────────────────────────────────────────────────
  kibana:
    image: docker.elastic.co/kibana/kibana:8.12.0
    container_name: kibana
    restart: unless-stopped
    environment:
      - ELASTICSEARCH_HOSTS=http://elasticsearch:9200
      - KIBANA_SYSTEM_PASSWORD=kibana
    volumes:
      - kibana-data:/usr/share/kibana/data
    ports:
      - "5601:5601"
    depends_on:
      elasticsearch:
        condition: service_healthy
    networks:
      - elk-net
    healthcheck:
      test: ["CMD-SHELL", "curl -sf http://localhost:5601/api/status || exit 1"]
      interval: 30s
      timeout: 10s
      retries: 5
      start_period: 90s

  # ── Filebeat (sidecar — ships GlobalMart container logs to Logstash) ──────
  filebeat:
    image: docker.elastic.co/beats/filebeat:8.12.0
    container_name: filebeat
    restart: unless-stopped
    user: root
    environment:
      - ELASTICSEARCH_HOST=elasticsearch:9200
      - KIBANA_HOST=kibana:5601
    volumes:
      - ./filebeat/filebeat.yml:/usr/share/filebeat/filebeat.yml:ro
      - /var/lib/docker/containers:/var/lib/docker/containers:ro
      - /var/run/docker.sock:/var/run/docker.sock:ro
    depends_on:
      - logstash
      - kibana
    networks:
      - elk-net
    command: filebeat -e -strict.perms=false
