# ──────────────────────────────────────────────────────────────────────────────
# File: kubernetes/service.yaml
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: globalmart-service
  namespace: production
  labels:
    app: globalmart
  annotations:
    prometheus.io/scrape: "true"
spec:
  type: ClusterIP    # Internal only; Ingress handles external traffic
  selector:
    app: globalmart
  ports:
    - name: http
      protocol: TCP
      port: 80
      targetPort: 3000

---
# ── Blue Service (routes to Blue deployment pods) ─────────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: globalmart-blue
  namespace: production
  labels:
    app: globalmart
    slot: blue
spec:
  type: ClusterIP
  selector:
    app: globalmart
    slot: blue
  ports:
    - port: 80
      targetPort: 3000

---
# ── Green Service (routes to Green deployment pods) ───────────────────────────
apiVersion: v1
kind: Service
metadata:
  name: globalmart-green
  namespace: production
  labels:
    app: globalmart
    slot: green
spec:
  type: ClusterIP
  selector:
    app: globalmart
    slot: green
  ports:
    - port: 80
      targetPort: 3000

---
# ──────────────────────────────────────────────────────────────────────────────
# File: kubernetes/ingress.yaml
# Requires: nginx ingress controller (kubectl apply -f ingress-nginx)
# ──────────────────────────────────────────────────────────────────────────────
apiVersion: networking.k8s.io/v1
kind: Ingress
metadata:
  name: globalmart-ingress
  namespace: production
  annotations:
    kubernetes.io/ingress.class: "nginx"
    nginx.ingress.kubernetes.io/rewrite-target: /
    # Rate limiting to protect the API
    nginx.ingress.kubernetes.io/limit-rps: "100"
    # Enable CORS
    nginx.ingress.kubernetes.io/enable-cors: "true"
    nginx.ingress.kubernetes.io/cors-allow-origin: "https://globalmart.com"
    # SSL redirect
    nginx.ingress.kubernetes.io/ssl-redirect: "true"
    # Cert-manager for automatic TLS (requires cert-manager installed)
    cert-manager.io/cluster-issuer: "letsencrypt-prod"
spec:
  tls:
    - hosts:
        - api.globalmart.com
      secretName: globalmart-tls-secret
  rules:
    - host: api.globalmart.com
      http:
        paths:
          - path: /api
            pathType: Prefix
            backend:
              service:
                name: globalmart-service
                port:
                  number: 80
          - path: /health
            pathType: Exact
            backend:
              service:
                name: globalmart-service
                port:
                  number: 80
          - path: /metrics
            pathType: Exact
            backend:
              service:
                name: globalmart-service
                port:
                  number: 80

---
# ── Namespace definition ──────────────────────────────────────────────────────
apiVersion: v1
kind: Namespace
metadata:
  name: production
  labels:
    environment: production

---
apiVersion: v1
kind: Namespace
metadata:
  name: dev
  labels:
    environment: dev
