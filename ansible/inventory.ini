# ──────────────────────────────────────────────────────────────────────────────
# File: ansible/inventory.ini
# Edit the IP addresses to match your actual servers.
# ──────────────────────────────────────────────────────────────────────────────

[globalmart_servers]
web-server-01 ansible_host=192.168.1.10 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/globalmart.pem
web-server-02 ansible_host=192.168.1.11 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/globalmart.pem

[dev]
dev-server ansible_host=192.168.1.20 ansible_user=ubuntu ansible_ssh_private_key_file=~/.ssh/globalmart.pem

[production]
web-server-01
web-server-02

[all:vars]
ansible_python_interpreter=/usr/bin/python3
ansible_ssh_common_args='-o StrictHostKeyChecking=no'
